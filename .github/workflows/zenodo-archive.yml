# Archive each published GitHub release of fastp-gpu on Zenodo.
#
# Recommended alternative: Zenodo's built-in GitHub integration
# (https://zenodo.org/account/settings/github/) archives every release
# automatically with zero CI. Use this workflow only if you want to attach
# the built binaries (fastp, fastp-cpu, SHA256SUMS) produced by
# scripts/local/release_public.sh instead of, or in addition to, the
# auto-generated source tarball.
#
# Required repository secret:
#   ZENODO_TOKEN          - Zenodo personal access token with scopes
#                           "deposit:write" and "deposit:actions".
#                           Use https://sandbox.zenodo.org for testing
#                           by setting ZENODO_BASE_URL accordingly.
#
# Optional repository variables (Settings -> Secrets and variables -> Actions -> Variables):
#   ZENODO_CONCEPT_REC_ID - Concept record id of an existing Zenodo
#                           deposition. When set, the workflow creates a
#                           new version under that concept (preserving
#                           the concept DOI). When unset, the workflow
#                           creates a brand-new deposition the first
#                           time it runs; copy the returned concept id
#                           into this variable afterwards.
#   ZENODO_BASE_URL       - Defaults to https://zenodo.org/api . Set to
#                           https://sandbox.zenodo.org/api for dry runs.

name: zenodo archive

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing release tag to archive (e.g. v1.3.3-fastp-d0bromir.1)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  archive:
    runs-on: ubuntu-24.04
    env:
      ZENODO_BASE_URL: ${{ vars.ZENODO_BASE_URL || 'https://zenodo.org/api' }}
      ZENODO_CONCEPT_REC_ID: ${{ vars.ZENODO_CONCEPT_REC_ID }}
      ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Verify Zenodo token is configured
        run: |
          if [[ -z "${ZENODO_TOKEN}" ]]; then
            echo "::error::ZENODO_TOKEN secret is not set."
            exit 1
          fi
          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "::error::No release tag resolved."
            exit 1
          fi
          echo "Archiving release ${RELEASE_TAG} to ${ZENODO_BASE_URL}"

      - name: Checkout repository at the release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p zenodo-upload
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir zenodo-upload
          # Always include the source tarball auto-generated by GitHub.
          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${RELEASE_TAG}" \
            -o "zenodo-upload/source-${RELEASE_TAG}.tar.gz"
          ls -lah zenodo-upload/

      - name: Resolve fastp version
        id: version
        run: |
          set -euo pipefail
          ver=$(./scripts/version_manager.sh get 2>/dev/null || true)
          if [[ -z "${ver}" ]]; then
            ver="${RELEASE_TAG#v}"
          fi
          echo "version=${ver}" >> "$GITHUB_OUTPUT"
          echo "Resolved fastp version: ${ver}"

      - name: Create new Zenodo deposition (or new version)
        id: deposit
        run: |
          set -euo pipefail
          api="${ZENODO_BASE_URL%/}"
          auth=(-H "Authorization: Bearer ${ZENODO_TOKEN}" -H "Content-Type: application/json")

          if [[ -n "${ZENODO_CONCEPT_REC_ID}" ]]; then
            echo "Creating new version under concept ${ZENODO_CONCEPT_REC_ID}"
            # Find the latest deposition under this concept.
            latest=$(curl -fsSL "${auth[@]}" \
              "${api}/deposit/depositions?q=conceptrecid:${ZENODO_CONCEPT_REC_ID}&sort=mostrecent&size=1" \
              | jq -r '.[0].id')
            if [[ -z "${latest}" || "${latest}" == "null" ]]; then
              echo "::error::Could not resolve latest deposition for concept ${ZENODO_CONCEPT_REC_ID}"
              exit 1
            fi
            new_url=$(curl -fsSL -X POST "${auth[@]}" \
              "${api}/deposit/depositions/${latest}/actions/newversion" \
              | jq -r '.links.latest_draft')
            dep_id=$(basename "${new_url}")
          else
            echo "No concept id configured; creating a brand-new deposition."
            dep_id=$(curl -fsSL -X POST "${auth[@]}" \
              -d '{}' "${api}/deposit/depositions" \
              | jq -r '.id')
          fi

          if [[ -z "${dep_id}" || "${dep_id}" == "null" ]]; then
            echo "::error::Failed to obtain deposition id"
            exit 1
          fi
          echo "Deposition id: ${dep_id}"
          echo "id=${dep_id}" >> "$GITHUB_OUTPUT"

          # Fetch the bucket URL for fast file uploads.
          bucket=$(curl -fsSL "${auth[@]}" \
            "${api}/deposit/depositions/${dep_id}" \
            | jq -r '.links.bucket')
          echo "bucket=${bucket}" >> "$GITHUB_OUTPUT"

      - name: Remove stale files from the new draft
        run: |
          set -euo pipefail
          api="${ZENODO_BASE_URL%/}"
          dep_id="${{ steps.deposit.outputs.id }}"
          files=$(curl -fsSL \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" \
            "${api}/deposit/depositions/${dep_id}/files" \
            | jq -r '.[].id')
          for fid in ${files}; do
            curl -fsSL -X DELETE \
              -H "Authorization: Bearer ${ZENODO_TOKEN}" \
              "${api}/deposit/depositions/${dep_id}/files/${fid}"
          done

      - name: Upload release assets to Zenodo
        run: |
          set -euo pipefail
          bucket="${{ steps.deposit.outputs.bucket }}"
          for f in zenodo-upload/*; do
            name=$(basename "$f")
            echo "Uploading ${name}"
            curl -fsSL -X PUT \
              -H "Authorization: Bearer ${ZENODO_TOKEN}" \
              --upload-file "$f" \
              "${bucket}/${name}" >/dev/null
          done

      - name: Build and submit metadata
        run: |
          set -euo pipefail
          api="${ZENODO_BASE_URL%/}"
          dep_id="${{ steps.deposit.outputs.id }}"
          ver="${{ steps.version.outputs.version }}"
          tag="${RELEASE_TAG}"
          repo="${GITHUB_REPOSITORY}"
          release_url="https://github.com/${repo}/releases/tag/${tag}"

          jq -n \
            --arg title "fastp-gpu ${tag}" \
            --arg version "${ver}" \
            --arg tag "${tag}" \
            --arg url "${release_url}" \
            --arg repo "${repo}" \
            '{
              metadata: {
                title: $title,
                upload_type: "software",
                description: ("GPU-accelerated fork of OpenGene/fastp. " +
                              "Automated archive of GitHub release <a href=\"" + $url + "\">" + $tag + "</a> from " + $repo + "."),
                version: $version,
                creators: [
                  { name: "d0bromir" }
                ],
                keywords: ["bioinformatics", "fastq", "gpu", "cuda", "fastp", "preprocessing"],
                license: "MIT",
                related_identifiers: [
                  { relation: "isSupplementTo", identifier: $url, resource_type: "software", scheme: "url" }
                ],
                access_right: "open"
              }
            }' > metadata.json

          curl -fsSL -X PUT \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @metadata.json \
            "${api}/deposit/depositions/${dep_id}" >/dev/null

      - name: Publish the deposition
        id: publish
        run: |
          set -euo pipefail
          api="${ZENODO_BASE_URL%/}"
          dep_id="${{ steps.deposit.outputs.id }}"
          resp=$(curl -fsSL -X POST \
            -H "Authorization: Bearer ${ZENODO_TOKEN}" \
            "${api}/deposit/depositions/${dep_id}/actions/publish")
          doi=$(echo "${resp}" | jq -r '.doi')
          concept=$(echo "${resp}" | jq -r '.conceptrecid')
          html=$(echo "${resp}" | jq -r '.links.record_html // .links.html')
          echo "doi=${doi}" >> "$GITHUB_OUTPUT"
          echo "concept=${concept}" >> "$GITHUB_OUTPUT"
          echo "html=${html}" >> "$GITHUB_OUTPUT"

      - name: Summarise
        run: |
          {
            echo "### Zenodo archive"
            echo ""
            echo "- Release: \`${RELEASE_TAG}\`"
            echo "- DOI: \`${{ steps.publish.outputs.doi }}\`"
            echo "- Concept record id: \`${{ steps.publish.outputs.concept }}\`"
            echo "- Record: ${{ steps.publish.outputs.html }}"
            if [[ -z "${ZENODO_CONCEPT_REC_ID}" ]]; then
              echo ""
              echo "First-time publish detected. Save the concept record id above as the"
              echo "\`ZENODO_CONCEPT_REC_ID\` repository variable so future releases are"
              echo "registered as new versions of the same concept DOI."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
